<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="24" fill="url(#bgGradient)"/>

  <!-- Sandbox box (3D effect) -->
  <!-- Back face -->
  <path d="M60 85 L120 55 L180 85 L180 155 L120 185 L60 155 Z" fill="#4C1D95" opacity="0.5"/>
  <!-- Left face -->
  <path d="M60 85 L120 115 L120 185 L60 155 Z" fill="url(#boxGradient)" opacity="0.8"/>
  <!-- Right face -->
  <path d="M180 85 L120 115 L120 185 L180 155 Z" fill="url(#boxGradient)" opacity="0.6"/>
  <!-- Top face -->
  <path d="M60 85 L120 55 L180 85 L120 115 Z" fill="url(#boxGradient)"/>

  <!-- Grid lines on top (sandbox pattern) -->
  <path d="M80 75 L100 95" stroke="#E0E7FF" stroke-width="1.5" opacity="0.4"/>
  <path d="M100 65 L120 85" stroke="#E0E7FF" stroke-width="1.5" opacity="0.4"/>
  <path d="M120 55 L140 75" stroke="#E0E7FF" stroke-width="1.5" opacity="0.4"/>
  <path d="M140 65 L160 85" stroke="#E0E7FF" stroke-width="1.5" opacity="0.4"/>

  <!-- AI Agent circle -->
  <circle cx="120" cy="105" r="28" fill="url(#aiGradient)"/>

  <!-- AI "brain" pattern inside circle -->
  <circle cx="120" cy="105" r="20" fill="none" stroke="#FFF" stroke-width="2" opacity="0.9"/>
  <circle cx="112" cy="100" r="4" fill="#FFF" opacity="0.9"/>
  <circle cx="128" cy="100" r="4" fill="#FFF" opacity="0.9"/>
  <path d="M112 112 Q120 118 128 112" stroke="#FFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Connection dots (representing API/endpoints) -->
  <circle cx="50" cy="120" r="6" fill="#22D3EE"/>
  <circle cx="190" cy="120" r="6" fill="#22D3EE"/>
  <circle cx="120" cy="195" r="6" fill="#22D3EE"/>

  <!-- Connection lines -->
  <path d="M56 120 L92 105" stroke="#22D3EE" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  <path d="M184 120 L148 105" stroke="#22D3EE" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  <path d="M120 189 L120 133" stroke="#22D3EE" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
</svg>