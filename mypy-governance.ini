[mypy]
python_version = 3.11
files =
    modal_backend/models,
    modal_backend/security,
    modal_backend/platform_services/webhooks.py,
    modal_backend/api/serialization.py
ignore_missing_imports = true
warn_unused_configs = true
warn_unused_ignores = true
warn_return_any = true
check_untyped_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
follow_imports = silent
exclude = ^(tests/|modal_backend/__init__\.py)$

[mypy-modal_backend.mcp_tools.*]
ignore_errors = true

[mypy-modal_backend.agent_runtime.*]
ignore_errors = true

[mypy-modal_backend.main]
ignore_errors = true
