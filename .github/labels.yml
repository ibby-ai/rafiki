# GitHub Labels Reference
# This file is a reference for creating labels manually in GitHub UI.
# GitHub does not support automatic label creation from files.
#
# To create these labels:
# 1. Go to: https://github.com/Saidiibrahim/agent-sandbox-starter/labels
# 2. Click "New label" for each entry below

# Discovery Labels
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

# Priority Labels
- name: "priority:high"
  color: "d73a4a"
  description: "High priority item"

- name: "priority:medium"
  color: "fbca04"
  description: "Medium priority item"

- name: "priority:low"
  color: "0e8a16"
  description: "Low priority item"

