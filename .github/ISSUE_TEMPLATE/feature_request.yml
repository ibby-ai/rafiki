name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this feature solve? What's your use case?
      placeholder: "I'm trying to... but currently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this feature relate to?
      options:
        - Tools (new MCP tools or tool improvements)
        - API (new endpoints or API enhancements)
        - Agent Behavior (prompts, agent loop, permissions)
        - Infrastructure (Modal, sandboxing, deployment)
        - Observability (tracing, logging, monitoring)
        - Documentation
        - Other

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      description: How complex do you think this is? (optional)
      options:
        - Small (hours)
        - Medium (days)
        - Large (weeks)
        - Unknown

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to help implement this feature
          required: false
