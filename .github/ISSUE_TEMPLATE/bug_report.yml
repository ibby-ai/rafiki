name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `modal run -m agent_sandbox.app`
        2. Send query "..."
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Include any relevant logs or error messages.
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Agent Loop (agent_sandbox/agents/)
        - HTTP API (agent_sandbox/controllers/)
        - Tools (agent_sandbox/tools/)
        - Configuration (agent_sandbox/config/)
        - Modal/Sandbox Infrastructure
        - Other

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include your environment details.
      placeholder: |
        - Python version: 3.11
        - Modal CLI version: ...
        - OS: macOS/Linux/Windows
